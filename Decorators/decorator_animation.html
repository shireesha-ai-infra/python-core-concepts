<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Decorators - Memory Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .controls {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .lesson-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .lesson-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .lesson-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .lesson-btn.active {
            background: #4CAF50;
            box-shadow: 0 4px 12px rgba(76,175,80,0.4);
        }

        .animation-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: #ff9800;
            color: white;
        }

        .btn-secondary:hover {
            background: #e68900;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .speed-control input {
            width: 150px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .panel h2 {
            margin-bottom: 15px;
            color: #ffd700;
            font-size: 1.5em;
        }

        #codeDisplay {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            overflow-x: auto;
            min-height: 300px;
        }

        .code-line {
            transition: all 0.3s;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .code-line.highlight {
            background: rgba(76, 175, 80, 0.3);
            border-left: 3px solid #4CAF50;
        }

        .keyword { color: #569cd6; }
        .function { color: #dcdcaa; }
        .string { color: #ce9178; }
        .comment { color: #6a9955; }

        #memoryCanvas {
            width: 100%;
            height: 500px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .explanation {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .explanation h2 {
            color: #ffd700;
            margin-bottom: 15px;
        }

        #stepExplanation {
            font-size: 16px;
            line-height: 1.8;
            min-height: 100px;
        }

        .highlight-text {
            background: rgba(255, 215, 0, 0.3);
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600;
        }

        .memory-object {
            transition: all 0.5s ease;
        }

        .pulse {
            animation: pulse 1s ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .arrow {
            transition: all 0.5s ease;
        }

        @keyframes draw-arrow {
            from { stroke-dashoffset: 1000; }
            to { stroke-dashoffset: 0; }
        }

        .draw-arrow {
            animation: draw-arrow 1s ease forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Python Decorators - Memory Animation 🧠</h1>
        
        <div class="controls">
            <div class="lesson-selector">
                <button class="lesson-btn active" data-lesson="1">Lesson 1: Function as Object</button>
                <button class="lesson-btn" data-lesson="2">Lesson 2: Function in Variable</button>
                <button class="lesson-btn" data-lesson="3">Lesson 3: Closure</button>
                <button class="lesson-btn" data-lesson="4">Lesson 4: Simple Decorator</button>
                <button class="lesson-btn" data-lesson="5">Lesson 5: Decorator with Args</button>
            </div>
            
            <div class="animation-controls">
                <button class="btn btn-primary" id="playBtn">▶ Play</button>
                <button class="btn btn-secondary" id="nextBtn">Next Step →</button>
                <button class="btn btn-danger" id="resetBtn">↻ Reset</button>
                
                <div class="speed-control">
                    <label>Speed:</label>
                    <input type="range" id="speedSlider" min="0.5" max="3" step="0.5" value="1">
                    <span id="speedLabel">1x</span>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>💻 Python Code</h2>
                <div id="codeDisplay"></div>
            </div>
            
            <div class="panel">
                <h2>🧠 Memory Visualization</h2>
                <svg id="memoryCanvas"></svg>
            </div>
        </div>

        <div class="explanation">
            <h2>📚 What's Happening</h2>
            <div id="stepExplanation"></div>
        </div>
    </div>

    <script>
        const lessons = {
            1: {
                title: "Function as Object",
                code: `<span class="keyword">def</span> <span class="function">greet</span>():
    <span class="keyword">return</span> <span class="string">"Hello!"</span>

<span class="comment"># greet is a function object in memory</span>
<span class="keyword">print</span>(<span class="function">type</span>(greet))  <span class="comment"># &lt;class 'function'&gt;</span>`,
                steps: [
                    {
                        highlight: [0, 1],
                        explanation: "When we define a function, Python creates a <span class='highlight-text'>function object</span> in memory. This object contains the function's code, name, and other metadata.",
                        memory: [
                            { type: 'function', name: 'greet', id: 'func1', x: 300, y: 150, code: 'return "Hello!"' }
                        ],
                        arrows: []
                    },
                    {
                        highlight: [3, 4],
                        explanation: "The name <span class='highlight-text'>greet</span> is just a variable that <span class='highlight-text'>references</span> this function object. It's not the function itself - it's a pointer to it in memory!",
                        memory: [
                            { type: 'function', name: 'greet', id: 'func1', x: 300, y: 150, code: 'return "Hello!"' },
                            { type: 'variable', name: 'greet', id: 'var1', x: 100, y: 150, value: '→ func1' }
                        ],
                        arrows: [
                            { from: 'var1', to: 'func1', label: 'points to' }
                        ]
                    }
                ]
            },
            2: {
                title: "Function in Variable",
                code: `<span class="keyword">def</span> <span class="function">greet</span>():
    <span class="keyword">return</span> <span class="string">"Hello!"</span>

say_hello = greet  <span class="comment"># No parentheses!</span>
<span class="keyword">print</span>(say_hello())  <span class="comment"># "Hello!"</span>`,
                steps: [
                    {
                        highlight: [0, 1],
                        explanation: "First, the function object is created in memory.",
                        memory: [
                            { type: 'function', name: 'greet', id: 'func1', x: 350, y: 150, code: 'return "Hello!"' }
                        ],
                        arrows: []
                    },
                    {
                        highlight: [3],
                        explanation: "Now <span class='highlight-text'>say_hello = greet</span> creates a NEW variable that points to the SAME function object. We're not copying the function, just creating another reference to it!",
                        memory: [
                            { type: 'function', name: 'greet', id: 'func1', x: 350, y: 200, code: 'return "Hello!"' },
                            { type: 'variable', name: 'greet', id: 'var1', x: 100, y: 100, value: '→ func1' },
                            { type: 'variable', name: 'say_hello', id: 'var2', x: 100, y: 300, value: '→ func1' }
                        ],
                        arrows: [
                            { from: 'var1', to: 'func1', label: 'points to' },
                            { from: 'var2', to: 'func1', label: 'also points to' }
                        ]
                    },
                    {
                        highlight: [4],
                        explanation: "When we call <span class='highlight-text'>say_hello()</span>, Python follows the reference to the function object and executes it. Both names call the SAME function in memory!",
                        memory: [
                            { type: 'function', name: 'greet', id: 'func1', x: 350, y: 200, code: 'return "Hello!"', active: true },
                            { type: 'variable', name: 'greet', id: 'var1', x: 100, y: 100, value: '→ func1' },
                            { type: 'variable', name: 'say_hello', id: 'var2', x: 100, y: 300, value: '→ func1', active: true }
                        ],
                        arrows: [
                            { from: 'var1', to: 'func1', label: '' },
                            { from: 'var2', to: 'func1', label: 'calling!', active: true }
                        ]
                    }
                ]
            },
            3: {
                title: "Closure - Memory Magic",
                code: `<span class="keyword">def</span> <span class="function">outer</span>(x):
    <span class="keyword">def</span> <span class="function">inner</span>(y):
        <span class="keyword">return</span> x + y
    <span class="keyword">return</span> inner

add_five = outer(<span class="string">5</span>)
<span class="keyword">print</span>(add_five(<span class="string">10</span>))  <span class="comment"># 15</span>`,
                steps: [
                    {
                        highlight: [0, 1, 2, 3],
                        explanation: "The <span class='highlight-text'>outer</span> function is defined. It's just sitting in memory, waiting to be called.",
                        memory: [
                            { type: 'function', name: 'outer', id: 'outer_func', x: 300, y: 100, code: 'def outer(x): ...' }
                        ],
                        arrows: []
                    },
                    {
                        highlight: [5],
                        explanation: "We call <span class='highlight-text'>outer(5)</span>. Python creates a new execution frame with <span class='highlight-text'>x = 5</span> stored in it.",
                        memory: [
                            { type: 'function', name: 'outer', id: 'outer_func', x: 300, y: 80, code: 'def outer(x): ...' },
                            { type: 'frame', name: 'outer(5) frame', id: 'frame1', x: 300, y: 250, vars: {x: 5}, active: true }
                        ],
                        arrows: []
                    },
                    {
                        highlight: [1, 2],
                        explanation: "Inside outer's execution, the <span class='highlight-text'>inner</span> function is created. This inner function 'captures' the variable <span class='highlight-text'>x</span> from outer's frame - this is a CLOSURE!",
                        memory: [
                            { type: 'function', name: 'outer', id: 'outer_func', x: 200, y: 80, code: 'def outer(x): ...' },
                            { type: 'frame', name: 'outer(5) frame', id: 'frame1', x: 200, y: 250, vars: {x: 5}, active: true },
                            { type: 'function', name: 'inner', id: 'inner_func', x: 450, y: 250, code: 'return x + y', closure: {x: 5} }
                        ],
                        arrows: [
                            { from: 'inner_func', to: 'frame1', label: 'captures x=5', dashed: true }
                        ]
                    },
                    {
                        highlight: [3],
                        explanation: "<span class='highlight-text'>outer</span> returns the inner function object. The outer frame is about to be destroyed...",
                        memory: [
                            { type: 'function', name: 'outer', id: 'outer_func', x: 150, y: 80, code: 'def outer(x): ...' },
                            { type: 'frame', name: 'outer(5) frame', id: 'frame1', x: 150, y: 250, vars: {x: 5}, fading: true },
                            { type: 'function', name: 'inner', id: 'inner_func', x: 400, y: 200, code: 'return x + y', closure: {x: 5} },
                            { type: 'variable', name: 'add_five', id: 'var1', x: 100, y: 350, value: '→ inner' }
                        ],
                        arrows: [
                            { from: 'var1', to: 'inner_func', label: 'points to' }
                        ]
                    },
                    {
                        highlight: [6],
                        explanation: "✨ MAGIC MOMENT! Even though outer's frame is GONE, <span class='highlight-text'>inner</span> still remembers <span class='highlight-text'>x = 5</span> in its closure! When we call add_five(10), it uses the captured x=5.",
                        memory: [
                            { type: 'function', name: 'outer', id: 'outer_func', x: 150, y: 80, code: 'def outer(x): ...', inactive: true },
                            { type: 'function', name: 'inner', id: 'inner_func', x: 400, y: 200, code: 'return x + y', closure: {x: 5}, active: true },
                            { type: 'variable', name: 'add_five', id: 'var1', x: 100, y: 350, value: '→ inner' },
                            { type: 'frame', name: 'add_five(10) frame', id: 'frame2', x: 400, y: 350, vars: {y: 10}, active: true }
                        ],
                        arrows: [
                            { from: 'var1', to: 'inner_func', label: '' },
                            { from: 'inner_func', to: 'frame2', label: 'executing with y=10' }
                        ]
                    }
                ]
            },
            4: {
                title: "Simple Decorator",
                code: `<span class="keyword">def</span> <span class="function">decorator</span>(func):
    <span class="keyword">def</span> <span class="function">wrapper</span>():
        <span class="keyword">print</span>(<span class="string">"Before"</span>)
        func()
        <span class="keyword">print</span>(<span class="string">"After"</span>)
    <span class="keyword">return</span> wrapper

<span class="keyword">def</span> <span class="function">say_hello</span>():
    <span class="keyword">print</span>(<span class="string">"Hello!"</span>)

say_hello = decorator(say_hello)
say_hello()`,
                steps: [
                    {
                        highlight: [8, 9],
                        explanation: "First, we define <span class='highlight-text'>say_hello</span>. It's a simple function in memory.",
                        memory: [
                            { type: 'function', name: 'say_hello', id: 'original_func', x: 300, y: 150, code: 'print("Hello!")' }
                        ],
                        arrows: []
                    },
                    {
                        highlight: [11],
                        explanation: "Now we call <span class='highlight-text'>decorator(say_hello)</span>. We're passing the original function AS AN ARGUMENT!",
                        memory: [
                            { type: 'function', name: 'decorator', id: 'dec_func', x: 150, y: 80, code: 'def decorator(func): ...' },
                            { type: 'function', name: 'say_hello (original)', id: 'original_func', x: 450, y: 80, code: 'print("Hello!")' },
                            { type: 'frame', name: 'decorator() frame', id: 'dec_frame', x: 150, y: 220, vars: {func: '→ original'}, active: true }
                        ],
                        arrows: [
                            { from: 'dec_frame', to: 'original_func', label: 'func parameter points to', dashed: true }
                        ]
                    },
                    {
                        highlight: [1, 2, 3, 4, 5],
                        explanation: "Inside decorator, we create <span class='highlight-text'>wrapper</span>. This wrapper CAPTURES the original function in its closure! It will call the original func, but add behavior before and after.",
                        memory: [
                            { type: 'function', name: 'decorator', id: 'dec_func', x: 100, y: 60, code: 'def decorator(func): ...' },
                            { type: 'function', name: 'say_hello (original)', id: 'original_func', x: 500, y: 60, code: 'print("Hello!")' },
                            { type: 'frame', name: 'decorator() frame', id: 'dec_frame', x: 100, y: 200, vars: {func: '→ original'}, active: true },
                            { type: 'function', name: 'wrapper', id: 'wrapper_func', x: 300, y: 320, code: 'print("Before")\nfunc()\nprint("After")', closure: {func: '→ original'} }
                        ],
                        arrows: [
                            { from: 'dec_frame', to: 'original_func', label: 'func points to', dashed: true },
                            { from: 'wrapper_func', to: 'original_func', label: 'captures func', dashed: true }
                        ]
                    },
                    {
                        highlight: [6],
                        explanation: "Decorator returns the <span class='highlight-text'>wrapper</span> function. Now we REASSIGN say_hello to point to wrapper instead of the original!",
                        memory: [
                            { type: 'function', name: 'say_hello (original)', id: 'original_func', x: 500, y: 100, code: 'print("Hello!")' },
                            { type: 'function', name: 'wrapper', id: 'wrapper_func', x: 250, y: 250, code: 'print("Before")\nfunc()\nprint("After")', closure: {func: '→ original'} },
                            { type: 'variable', name: 'say_hello', id: 'new_var', x: 80, y: 250, value: '→ wrapper' }
                        ],
                        arrows: [
                            { from: 'new_var', to: 'wrapper_func', label: 'now points to wrapper!' },
                            { from: 'wrapper_func', to: 'original_func', label: 'remembers original', dashed: true }
                        ]
                    },
                    {
                        highlight: [12],
                        explanation: "🎯 When we call <span class='highlight-text'>say_hello()</span> now, we're actually calling WRAPPER! Wrapper prints 'Before', calls the ORIGINAL function, then prints 'After'. The original function is hidden inside the closure!",
                        memory: [
                            { type: 'function', name: 'say_hello (original)', id: 'original_func', x: 500, y: 100, code: 'print("Hello!")', active: true },
                            { type: 'function', name: 'wrapper', id: 'wrapper_func', x: 250, y: 250, code: 'print("Before")\nfunc()\nprint("After")', closure: {func: '→ original'}, active: true },
                            { type: 'variable', name: 'say_hello', id: 'new_var', x: 80, y: 250, value: '→ wrapper', active: true }
                        ],
                        arrows: [
                            { from: 'new_var', to: 'wrapper_func', label: 'calling!', active: true },
                            { from: 'wrapper_func', to: 'original_func', label: 'calls original', active: true }
                        ]
                    }
                ]
            },
            5: {
                title: "Decorator with Arguments",
                code: `<span class="keyword">def</span> <span class="function">decorator</span>(func):
    <span class="keyword">def</span> <span class="function">wrapper</span>(*args, **kwargs):
        <span class="keyword">print</span>(<span class="string">"Before"</span>)
        result = func(*args, **kwargs)
        <span class="keyword">print</span>(<span class="string">"After"</span>)
        <span class="keyword">return</span> result
    <span class="keyword">return</span> wrapper

<span class="keyword">def</span> <span class="function">greet</span>(name):
    <span class="keyword">return</span> <span class="string">f"Hello, {name}!"</span>

greet = decorator(greet)
<span class="keyword">print</span>(greet(<span class="string">"Alice"</span>))`,
                steps: [
                    {
                        highlight: [9, 10],
                        explanation: "Original <span class='highlight-text'>greet</span> function that takes a parameter <span class='highlight-text'>name</span>.",
                        memory: [
                            { type: 'function', name: 'greet (original)', id: 'orig', x: 300, y: 150, code: 'return f"Hello, {name}!"' }
                        ],
                        arrows: []
                    },
                    {
                        highlight: [1, 2, 3, 4, 5, 6],
                        explanation: "The wrapper uses <span class='highlight-text'>*args, **kwargs</span> to capture ANY arguments. It will pass them through to the original function!",
                        memory: [
                            { type: 'function', name: 'greet (original)', id: 'orig', x: 450, y: 80, code: 'return f"Hello, {name}!"' },
                            { type: 'function', name: 'wrapper', id: 'wrap', x: 250, y: 250, code: 'wrapper(*args, **kwargs)', closure: {func: '→ orig'} }
                        ],
                        arrows: [
                            { from: 'wrap', to: 'orig', label: 'captures original', dashed: true }
                        ]
                    },
                    {
                        highlight: [12],
                        explanation: "After decoration, <span class='highlight-text'>greet</span> points to wrapper.",
                        memory: [
                            { type: 'function', name: 'greet (original)', id: 'orig', x: 450, y: 100, code: 'return f"Hello, {name}!"' },
                            { type: 'function', name: 'wrapper', id: 'wrap', x: 250, y: 250, code: 'wrapper(*args, **kwargs)', closure: {func: '→ orig'} },
                            { type: 'variable', name: 'greet', id: 'var', x: 80, y: 250, value: '→ wrapper' }
                        ],
                        arrows: [
                            { from: 'var', to: 'wrap', label: 'points to' },
                            { from: 'wrap', to: 'orig', label: 'remembers', dashed: true }
                        ]
                    },
                    {
                        highlight: [13],
                        explanation: "When we call <span class='highlight-text'>greet('Alice')</span>, the argument flows through: wrapper receives it in *args, then passes it to the original function!",
                        memory: [
                            { type: 'function', name: 'greet (original)', id: 'orig', x: 450, y: 100, code: 'return f"Hello, {name}!"', active: true },
                            { type: 'function', name: 'wrapper', id: 'wrap', x: 250, y: 250, code: 'wrapper(*args, **kwargs)', closure: {func: '→ orig'}, active: true },
                            { type: 'variable', name: 'greet', id: 'var', x: 80, y: 250, value: '→ wrapper' },
                            { type: 'frame', name: 'wrapper frame', id: 'frame', x: 250, y: 380, vars: {args: '("Alice",)', kwargs: '{}'}, active: true }
                        ],
                        arrows: [
                            { from: 'var', to: 'wrap', label: 'call with "Alice"', active: true },
                            { from: 'wrap', to: 'orig', label: 'passes args', active: true }
                        ]
                    }
                ]
            }
        };

        let currentLesson = 1;
        let currentStep = 0;
        let isPlaying = false;
        let playInterval = null;
        let animationSpeed = 1;

        const codeDisplay = document.getElementById('codeDisplay');
        const memoryCanvas = document.getElementById('memoryCanvas');
        const stepExplanation = document.getElementById('stepExplanation');
        const speedSlider = document.getElementById('speedSlider');
        const speedLabel = document.getElementById('speedLabel');

        function loadLesson(lessonNum) {
            currentLesson = lessonNum;
            currentStep = 0;
            stopPlay();
            
            // Update active button
            document.querySelectorAll('.lesson-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lesson == lessonNum);
            });
            
            displayCode();
            displayStep();
        }

        function displayCode() {
            const lesson = lessons[currentLesson];
            codeDisplay.innerHTML = lesson.code.split('\n').map((line, i) => 
                `<div class="code-line" data-line="${i}">${line}</div>`
            ).join('');
        }

        function displayStep() {
            const lesson = lessons[currentLesson];
            const step = lesson.steps[currentStep];
            
            // Highlight code
            document.querySelectorAll('.code-line').forEach(line => {
                line.classList.remove('highlight');
            });
            step.highlight.forEach(lineNum => {
                const line = document.querySelector(`[data-line="${lineNum}"]`);
                if (line) line.classList.add('highlight');
            });
            
            // Show explanation
            stepExplanation.innerHTML = step.explanation;
            
            // Draw memory
            drawMemory(step.memory, step.arrows);
        }

        function drawMemory(objects, arrows) {
            memoryCanvas.innerHTML = '';
            
            // Draw objects
            objects.forEach(obj => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.classList.add('memory-object');
                if (obj.active) g.classList.add('pulse');
                
                if (obj.type === 'function') {
                    // Function box
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('x', obj.x - 70);
                    rect.setAttribute('y', obj.y - 40);
                    rect.setAttribute('width', 140);
                    rect.setAttribute('height', 80);
                    rect.setAttribute('fill', obj.active ? '#4CAF50' : obj.inactive ? '#555' : '#2196F3');
                    rect.setAttribute('stroke', '#fff');
                    rect.setAttribute('stroke-width', '2');
                    rect.setAttribute('rx', '8');
                    rect.setAttribute('opacity', obj.fading ? '0.3' : '1');
                    g.appendChild(rect);
                    
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', obj.x);
                    text.setAttribute('y', obj.y - 10);
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('fill', '#fff');
                    text.setAttribute('font-weight', 'bold');
                    text.textContent = obj.name;
                    g.appendChild(text);
                    
                    const code = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    code.setAttribute('x', obj.x);
                    code.setAttribute('y', obj.y + 10);
                    code.setAttribute('text-anchor', 'middle');
                    code.setAttribute('fill', '#fff');
                    code.setAttribute('font-size', '10');
                    code.textContent = obj.code.substring(0, 20) + '...';
                    g.appendChild(code);
                    
                    if (obj.closure) {
                        const closureText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        closureText.setAttribute('x', obj.x);
                        closureText.setAttribute('y', obj.y + 25);
                        closureText.setAttribute('text-anchor', 'middle');
                        closureText.setAttribute('fill', '#FFD700');
                        closureText.setAttribute('font-size', '9');
                        closureText.textContent = '🔒 ' + Object.entries(obj.closure).map(([k,v]) => `${k}=${v}`).join(', ');
                        g.appendChild(closureText);
                    }
                } else if (obj.type === 'variable') {
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', obj.x);
                    circle.setAttribute('cy', obj.y);
                    circle.setAttribute('r', 30);
                    circle.setAttribute('fill', obj.active ? '#FF9800' : '#9C27B0');
                    circle.setAttribute('stroke', '#fff');
                    circle.setAttribute('stroke-width', '2');
                    g.appendChild(circle);
                    
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', obj.x);
                    text.setAttribute('y', obj.y + 5);
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('fill', '#fff');
                    text.setAttribute('font-size', '12');
                    text.setAttribute('font-weight', 'bold');
                    text.textContent = obj.name;
                    g.appendChild(text);
                } else if (obj.type === 'frame') {
                    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('x', obj.x - 80);
                    rect.setAttribute('y', obj.y - 30);
                    rect.setAttribute('width', 160);
                    rect.setAttribute('height', 60);
                    rect.setAttribute('fill', obj.active ? '#FF5722' : '#795548');
                    rect.setAttribute('stroke', '#fff');
                    rect.setAttribute('stroke-width', '2');
                    rect.setAttribute('stroke-dasharray', obj.fading ? '5,5' : '0');
                    rect.setAttribute('rx', '8');
                    rect.setAttribute('opacity', obj.fading ? '0.3' : '1');
                    g.appendChild(rect);
                    
                    const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    title.setAttribute('x', obj.x);
                    title.setAttribute('y', obj.y - 5);
                    title.setAttribute('text-anchor', 'middle');
                    title.setAttribute('fill', '#fff');
                    title.setAttribute('font-weight', 'bold');
                    title.setAttribute('font-size', '11');
                    title.textContent = obj.name;
                    g.appendChild(title);
                    
                    const vars = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    vars.setAttribute('x', obj.x);
                    vars.setAttribute('y', obj.y + 12);
                    vars.setAttribute('text-anchor', 'middle');
                    vars.setAttribute('fill', '#fff');
                    vars.setAttribute('font-size', '10');
                    vars.textContent = Object.entries(obj.vars).map(([k,v]) => `${k}: ${v}`).join(', ');
                    g.appendChild(vars);
                }
                
                g.setAttribute('id', obj.id);
                memoryCanvas.appendChild(g);
            });
            
            // Draw arrows
            arrows.forEach(arrow => {
                const fromEl = document.getElementById(arrow.from);
                const toEl = document.getElementById(arrow.to);
                if (!fromEl || !toEl) return;
                
                const fromRect = fromEl.getBBox();
                const toRect = toEl.getBBox();
                
                const x1 = fromRect.x + fromRect.width;
                const y1 = fromRect.y + fromRect.height / 2;
                const x2 = toRect.x;
                const y2 = toRect.y + toRect.height / 2;
                
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const midX = (x1 + x2) / 2;
                const d = `M ${x1} ${y1} Q ${midX} ${y1}, ${midX} ${(y1+y2)/2} T ${x2} ${y2}`;
                path.setAttribute('d', d);
                path.setAttribute('stroke', arrow.active ? '#FFD700' : '#fff');
                path.setAttribute('stroke-width', arrow.active ? '3' : '2');
                path.setAttribute('fill', 'none');
                path.setAttribute('marker-end', 'url(#arrowhead)');
                if (arrow.dashed) path.setAttribute('stroke-dasharray', '5,5');
                path.classList.add('arrow');
                
                memoryCanvas.insertBefore(path, memoryCanvas.firstChild);
                
                if (arrow.label) {
                    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    label.setAttribute('x', midX);
                    label.setAttribute('y', (y1 + y2) / 2 - 5);
                    label.setAttribute('text-anchor', 'middle');
                    label.setAttribute('fill', '#FFD700');
                    label.setAttribute('font-size', '11');
                    label.setAttribute('font-weight', 'bold');
                    label.textContent = arrow.label;
                    memoryCanvas.appendChild(label);
                }
            });
            
            // Add arrowhead marker
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id', 'arrowhead');
            marker.setAttribute('markerWidth', '10');
            marker.setAttribute('markerHeight', '10');
            marker.setAttribute('refX', '9');
            marker.setAttribute('refY', '3');
            marker.setAttribute('orient', 'auto');
            const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            polygon.setAttribute('points', '0 0, 10 3, 0 6');
            polygon.setAttribute('fill', '#fff');
            marker.appendChild(polygon);
            defs.appendChild(marker);
            memoryCanvas.insertBefore(defs, memoryCanvas.firstChild);
        }

        function nextStep() {
            const lesson = lessons[currentLesson];
            if (currentStep < lesson.steps.length - 1) {
                currentStep++;
                displayStep();
            } else {
                stopPlay();
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                displayStep();
            }
        }

        function reset() {
            currentStep = 0;
            stopPlay();
            displayStep();
        }

        function play() {
            if (isPlaying) {
                stopPlay();
            } else {
                isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸ Pause';
                playInterval = setInterval(() => {
                    nextStep();
                }, 2000 / animationSpeed);
            }
        }

        function stopPlay() {
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶ Play';
            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        // Event listeners
        document.querySelectorAll('.lesson-btn').forEach(btn => {
            btn.addEventListener('click', () => loadLesson(parseInt(btn.dataset.lesson)));
        });

        document.getElementById('playBtn').addEventListener('click', play);
        document.getElementById('nextBtn').addEventListener('click', nextStep);
        document.getElementById('resetBtn').addEventListener('click', reset);

        speedSlider.addEventListener('input', (e) => {
            animationSpeed = parseFloat(e.target.value);
            speedLabel.textContent = animationSpeed + 'x';
            if (isPlaying) {
                stopPlay();
                play();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextStep();
            if (e.key === 'ArrowLeft') prevStep();
            if (e.key === ' ') {
                e.preventDefault();
                play();
            }
            if (e.key === 'r' || e.key === 'R') reset();
        });

        // Initialize
        loadLesson(1);
    </script>
</body>
</html>
